<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINARUAL — Binaural Beats Synthesizer</title>
    <style>
        :root {
            --accent: #8B5CF6;
            --accent-delta: #4F6EF7;
            --accent-theta: #6D5EF9;
            --accent-alpha: #8B5CF6;
            --accent-beta: #A855F7;
            --accent-gamma: #C084FC;
            --accent-contrast: #FFFFFF;
            --bg-dark: #0A0A0F;
            --glass-bg: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.08);
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255,255,255,0.6);
            --shadow-inner: inset 0 1px 0 rgba(255,255,255,0.1);
            --shadow-outer: 0 8px 32px rgba(0,0,0,0.4);
            --knob-size: 80px;
            --knob-size-sm: 60px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            position: relative;
        }

        /* 3D Interactive WebGL Background */
        #webgl-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: auto;
            touch-action: pan-y pinch-zoom;
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--shadow-outer);
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }

        .theme-switcher {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
            max-width: 440px;
        }

        .theme-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 40px;
            padding: 10px 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 999px;
            color: var(--text-secondary);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            white-space: nowrap;
            cursor: pointer;
            transition: background-color 0.28s ease, border-color 0.28s ease, box-shadow 0.32s ease, color 0.28s ease, transform 0.18s ease;
        }

        .theme-btn:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.08);
            transform: translateY(-1px);
        }

        .theme-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--accent-contrast);
            box-shadow: 0 0 24px var(--accent);
        }

        .theme-btn:active {
            transform: translateY(1px);
        }

        .theme-chip {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--swatch, var(--accent));
            box-shadow: 0 0 14px var(--swatch, var(--accent));
            flex: 0 0 auto;
        }

        .app-name {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 11px;
            color: var(--text-secondary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .state-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            transition: border-color 0.28s ease, box-shadow 0.32s ease, background-color 0.28s ease;
        }

        .state-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent);
            transition: background-color 0.28s ease, box-shadow 0.32s ease;
        }

        .state-text {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.28s ease;
        }

        .brainwave-label,
        .knob-progress,
        .knob-value,
        .timer-value,
        .countdown-value,
        .play-btn,
        .play-btn::before,
        .preset-btn,
        .waveform-btn,
        .timer-btn,
        .noise-toggle {
            transition: background-color 0.28s ease, border-color 0.28s ease, box-shadow 0.32s ease, color 0.28s ease, stroke 0.28s ease, transform 0.18s ease, opacity 0.28s ease;
        }

        /* Visualizer */
        .visualizer-container {
            margin-bottom: 24px;
            padding: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--shadow-outer);
            position: relative;
        }

        .visualizer {
            width: 100%;
            height: 140px;
            background: rgba(0,0,0,0.4);
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            display: block;
        }

        .visualizer-label {
            position: absolute;
            top: 12px;
            left: 16px;
            font-size: 9px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Grid layouts */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 24px;
        }

        .panel {
            padding: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--shadow-outer);
        }

        /* Preset strip */
        .preset-strip {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .preset-btn {
            flex: 1;
            min-width: 80px;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .preset-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .preset-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--accent-contrast);
            box-shadow: 0 0 20px var(--accent);
        }

        .preset-btn:active {
            transform: translateY(2px);
        }

        /* L/R Display panel */
        .lr-display-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .lr-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            border: 1px solid var(--glass-border);
        }

        .lr-value {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 24px;
            font-weight: 500;
            tabular-nums: true;
        }

        .lr-label {
            font-size: 10px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .brainwave-label {
            font-size: 11px;
            color: var(--accent);
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Knob styles */
        .knob-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 24px;
        }

        .knob-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .knob {
            width: var(--knob-size);
            height: var(--knob-size);
            position: relative;
            cursor: grab;
            touch-action: none;
        }

        .knob:active {
            cursor: grabbing;
        }

        .knob svg {
            width: 100%;
            height: 100%;
            transform: rotate(-135deg);
        }

        .knob-bg {
            fill: none;
            stroke: rgba(255,255,255,0.1);
            stroke-width: 8;
        }

        .knob-progress {
            fill: none;
            stroke: var(--accent);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke 0.3s ease;
        }

        .knob-handle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            background: var(--text-primary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .knob-handle::after {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 18px;
            background: var(--text-primary);
            border-radius: 1px;
        }

        .knob-label {
            font-size: 10px;
            color: var(--text-secondary);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-align: center;
        }

        .knob-value {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 16px;
            font-weight: 500;
            color: var(--accent);
            tabular-nums: true;
        }

        .knob-unit {
            font-size: 10px;
            color: var(--text-secondary);
        }

        /* Smaller knobs */
        .knob-sm .knob {
            width: var(--knob-size-sm);
            height: var(--knob-size-sm);
        }

        .knob-sm .knob-label {
            font-size: 9px;
        }

        .knob-sm .knob-value {
            font-size: 14px;
        }

        /* Waveform selector */
        .waveform-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .waveform-btn {
            flex: 1;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .waveform-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .waveform-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--accent-contrast);
            box-shadow: 0 0 20px var(--accent);
        }

        .waveform-btn:active {
            transform: translateY(2px);
        }

        /* Timer section */
        .timer-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
            margin-bottom: 24px;
        }

        .timer-presets {
            display: flex;
            gap: 8px;
        }

        .timer-btn {
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .timer-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .timer-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--accent-contrast);
            box-shadow: 0 0 18px var(--accent);
        }

        .timer-btn:active {
            transform: translateY(2px);
        }

        .timer-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            position: relative;
        }

        .timer-value {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 32px;
            font-weight: 500;
            color: var(--accent);
            tabular-nums: true;
        }

        .timer-label {
            font-size: 10px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Countdown overlay */
        .countdown-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .countdown-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .countdown-value {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 18px;
            color: var(--accent);
        }

        /* Main controls */
        .main-controls {
            display: flex;
            justify-content: center;
            gap: 24px;
        }

        .play-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: var(--accent-contrast);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 40px var(--accent);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            position: relative;
        }

        .play-btn::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .play-btn:hover::before {
            opacity: 1;
            animation: pulse-ring 2s ease-out infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px var(--accent);
        }

        .play-btn:active {
            transform: scale(0.98);
        }

        .play-btn.playing {
            background: var(--accent);
            color: var(--accent-contrast);
            box-shadow: 0 0 56px var(--accent);
        }

        .play-btn.playing::before {
            opacity: 1;
            animation: pulse-ring 2s ease-out infinite;
        }

        .play-btn.playing:hover {
            box-shadow: 0 0 72px var(--accent);
        }

        .play-icon {
            font-size: 24px;
        }

        .reset-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .reset-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .reset-btn:active {
            transform: translateY(2px);
        }

        /* Noise controls */
        .noise-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .noise-toggle {
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .noise-toggle.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--accent-contrast);
            box-shadow: 0 0 18px var(--accent);
        }

        .theme-btn,
        .preset-btn,
        .waveform-btn,
        .timer-btn,
        .noise-toggle,
        .play-btn,
        .reset-btn {
            touch-action: manipulation;
        }

        .aux-row {
            grid-template-columns: minmax(0, 1.3fr) minmax(132px, 0.8fr) minmax(0, 1.6fr);
            align-items: center;
        }

        .aux-control {
            justify-content: center;
            min-height: 100%;
        }

        .aux-waveforms {
            flex-wrap: wrap;
            justify-content: flex-end;
            margin-bottom: 0;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .container {
                padding: 20px;
            }

            .header,
            .visualizer-container,
            .panel {
                padding: 20px;
            }

            .grid-2 {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .grid-4,
            .knob-row {
                gap: 20px;
            }

            .header {
                align-items: flex-start;
                gap: 20px;
            }
        }

        @media (max-width: 900px) {
            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .header-right {
                align-items: stretch;
            }

            .theme-switcher {
                max-width: none;
                justify-content: flex-start;
            }

            .state-badge {
                align-self: flex-start;
            }

            .grid-4,
            .knob-row {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .timer-section {
                align-items: flex-start;
                flex-wrap: wrap;
            }

            .aux-row {
                grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            }

            .aux-row > :first-child {
                grid-column: 1 / -1;
            }

            .aux-waveforms {
                justify-content: flex-start;
            }
        }

        @media (max-width: 640px) {
            :root {
                --knob-size: 72px;
                --knob-size-sm: 58px;
            }

            .container {
                padding: 16px 14px calc(28px + env(safe-area-inset-bottom));
            }

            .header,
            .visualizer-container,
            .panel {
                padding: 16px;
                border-radius: 14px;
            }

            .header {
                gap: 14px;
                margin-bottom: 20px;
            }

            .app-name {
                font-size: clamp(22px, 7vw, 26px);
                letter-spacing: 3px;
            }

            .tagline {
                letter-spacing: 1.6px;
            }

            .header-right {
                gap: 10px;
            }

            .theme-switcher {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 10px;
                width: 100%;
            }

            .theme-btn {
                min-width: 0;
                width: 100%;
                min-height: 44px;
                padding: 10px 12px;
            }

            .state-badge {
                width: 100%;
                justify-content: center;
            }

            .visualizer-container {
                margin-bottom: 16px;
                padding-top: 22px;
            }

            .visualizer {
                height: 96px;
            }

            .grid-2,
            .grid-4,
            .knob-row {
                gap: 16px;
                margin-bottom: 16px;
            }

            .preset-strip {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                width: 100%;
            }

            .preset-btn {
                min-width: 0;
                padding: 12px 10px;
            }

            .lr-display {
                padding: 14px;
                gap: 14px;
            }

            .lr-value {
                font-size: clamp(20px, 7vw, 26px);
            }

            .brainwave-label {
                font-size: 10px;
                line-height: 1.5;
            }

            .knob-row {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .knob-container {
                gap: 10px;
                min-width: 0;
            }

            .knob-label {
                font-size: 9px;
                letter-spacing: 1.2px;
            }

            .knob-value {
                font-size: 15px;
                text-align: center;
            }

            .aux-row {
                grid-template-columns: 1fr;
            }

            .aux-row > :first-child {
                grid-column: auto;
            }

            .aux-control {
                width: 100%;
            }

            .aux-waveforms {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 8px;
                width: 100%;
                justify-content: stretch;
            }

            .waveform-btn,
            .noise-toggle {
                min-height: 44px;
            }

            .timer-section {
                flex-direction: column;
                align-items: stretch;
                gap: 16px;
                margin-bottom: 20px;
            }

            .timer-presets {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 8px;
                width: 100%;
            }

            .timer-btn {
                padding: 12px 8px;
            }

            .timer-display {
                align-items: flex-start;
                min-height: 72px;
            }

            .timer-value {
                font-size: clamp(28px, 10vw, 36px);
            }

            .countdown-overlay {
                justify-content: flex-start;
                padding-left: 2px;
            }

            .main-controls {
                justify-content: center;
                align-items: center;
                gap: 16px;
                padding-top: 8px;
            }

            .play-btn {
                width: min(31vw, 112px);
                height: min(31vw, 112px);
                min-width: 96px;
                min-height: 96px;
                font-size: 13px;
                letter-spacing: 1.8px;
            }

            .play-icon {
                font-size: 22px;
            }

            .reset-btn {
                width: 56px;
                height: 56px;
                flex: 0 0 auto;
            }
        }

        @media (max-width: 420px) {
            .theme-btn,
            .preset-btn,
            .waveform-btn,
            .timer-btn,
            .noise-toggle {
                font-size: 9px;
                letter-spacing: 1.2px;
            }

            .preset-strip {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .knob-row {
                gap: 14px 10px;
            }

            .main-controls {
                gap: 14px;
            }

            .play-btn {
                min-width: 92px;
                min-height: 92px;
            }

    <script>
        // ============================================
        // 3D Interactive WebGL Background
        // ============================================
        
        const glCanvas = document.getElementById('webgl-canvas');
        const gl = glCanvas.getContext('webgl') || glCanvas.getContext('experimental-webgl');
        
        let mouseX = 0, mouseY = 0;
        let targetMouseX = 0, targetMouseY = 0;
        let time = 0;
        
        // Vertex shader
        const vertexShaderSource = `
            attribute vec2 position;
            varying vec2 vUv;
            void main() {
                vUv = position * 0.5 + 0.5;
                gl_Position = vec4(position, 0.0, 1.0);
            }
        `;
        
        // Fragment shader - Procedural flowing field
        const fragmentShaderSource = `
            precision highp float;
            varying vec2 vUv;
            uniform float uTime;
            uniform vec2 uMouse;
            uniform vec3 uAccent;
            
            // Simplex noise
            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }
            
            float snoise(vec2 v) {
                const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
                vec2 i  = floor(v + dot(v, C.yy) );
                vec2 x0 = v -   i + dot(i, C.xx);
                vec2 i1;
                i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
                vec4 x12 = x0.xyxy + C.xxzz;
                x12.xy -= i1;
                i = mod289(i);
                vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 )) + i.x + vec3(0.0, i1.x, 1.0 ));
                vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
                m = m*m ;
                m = m*m ;
                vec3 x = 2.0 * fract(p * C.www) - 1.0;
                vec3 h = abs(x) - 0.5;
                vec3 ox = floor(x + 0.5);
                vec3 a0 = x - ox;
                m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
                vec3 g;
                g.x  = a0.x  * x0.x  + h.x  * x0.y;
                g.yz = a0.yz * x12.xz + h.yz * x12.yw;
                return 130.0 * dot(m, g);
            }
            
            void main() {
                vec2 uv = vUv;
                
                // Mouse influence
                vec2 mouseNorm = uMouse * 2.0 - 1.0;
                float mouseDist = distance(uv, vec2(0.5 + mouseNorm.x * 0.3, 0.5 + mouseNorm.y * 0.3));
                
                // Layered noise for organic flow
                float n1 = snoise(uv * 2.0 + uTime * 0.1);
                float n2 = snoise(uv * 4.0 - uTime * 0.15 + vec2(n1));
                float n3 = snoise(uv * 8.0 + uTime * 0.08);
                
                // Combine layers
                float combined = n1 * 0.5 + n2 * 0.3 + n3 * 0.2;
                
                // Mouse interaction - creates ripple effect
                float ripple = sin(mouseDist * 20.0 - uTime * 2.0) * 0.15 * exp(-mouseDist * 3.0);
                combined += ripple;
                
                // Accent color mixing based on noise
                vec3 baseColor = vec3(0.04, 0.04, 0.06);
                vec3 accent = uAccent;
                
                // Create flowing color bands
                float band = smoothstep(-0.3, 0.3, combined);
                float glow = smoothstep(0.2, 0.5, combined + 0.2);
                
                vec3 color = mix(baseColor, accent, band * 0.15);
                color += accent * glow * 0.3;
                
                // Add subtle grain
                float grain = fract(sin(dot(uv, vec2(12.9898, 78.233))) * 43758.5453);
                color += grain * 0.02;
                
                // Vignette
                float vignette = 1.0 - smoothstep(0.8, 1.5, distance(uv, vec2(0.5)));
                color *= vignette;
                
                gl_FragColor = vec4(color, 1.0);
            }
        `;
        
        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Shader compile error:', gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }
        
        function createProgram(gl, vertexShader, fragmentShader) {
            const program = gl.createProgram();
            gl.attachShader(program, vertexShader);
            gl.attachShader(program, fragmentShader);
            gl.linkProgram(program);
            if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
                console.error('Program link error:', gl.getProgramInfoLog(program));
                return null;
            }
            return program;
        }
        
        const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
        const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);
        const program = createProgram(gl, vertexShader, fragmentShader);
        
        gl.useProgram(program);
        
        // Set up geometry (full screen quad)
        const positions = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);
        
        const positionLocation = gl.getAttribLocation(program, 'position');
        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);
        
        // Get uniform locations
        const timeLocation = gl.getUniformLocation(program, 'uTime');
        const mouseLocation = gl.getUniformLocation(program, 'uMouse');
        const accentLocation = gl.getUniformLocation(program, 'uAccent');
        
        function resizeGL() {
            glCanvas.width = window.innerWidth * window.devicePixelRatio;
            glCanvas.height = window.innerHeight * window.devicePixelRatio;
            gl.viewport(0, 0, glCanvas.width, glCanvas.height);
        }
        
        resizeGL();
        window.addEventListener('resize', resizeGL);
        
        // Mouse/touch tracking
        function updateMouse(x, y) {
            targetMouseX = x / window.innerWidth;
            targetMouseY = 1.0 - y / window.innerHeight;
        }
        
        glCanvas.addEventListener('mousemove', (e) => {
            updateMouse(e.clientX, e.clientY);
        });
        
        glCanvas.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            if (touch) {
                updateMouse(touch.clientX, touch.clientY);
            }
        }, { passive: true });
        
        glCanvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            if (touch) {
                updateMouse(touch.clientX, touch.clientY);
            }
        }, { passive: true });
        
        // Animation loop
        function renderGL() {
            time += 0.016;
            
            // Smooth mouse interpolation
            mouseX += (targetMouseX - mouseX) * 0.05;
            mouseY += (targetMouseY - mouseY) * 0.05;
            
            gl.uniform1f(timeLocation, time);
            gl.uniform2f(mouseLocation, mouseX, mouseY);
            
            // Get accent color
            const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
            const r = parseInt(accent.slice(1, 3), 16) / 255;
            const g = parseInt(accent.slice(3, 5), 16) / 255;
            const b = parseInt(accent.slice(5, 7), 16) / 255;
            gl.uniform3f(accentLocation, r, g, b);
            
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            requestAnimationFrame(renderGL);
        }
        
        renderGL();
        
        // ============================================
        // Knob Class
        // ============================================
        
        class Knob {
            constructor(element) {
                this.element = element;
                this.svg = element.querySelector('svg');
                this.progress = element.querySelector('.knob-progress');
                this.min = parseFloat(element.dataset.min) || 0;
                this.max = parseFloat(element.dataset.max) || 100;
                this.value = parseFloat(element.dataset.value) || this.min;
                this.onValueChange = null;
                this.isDragging = false;
                this.startY = 0;
                this.startValue = 0;
                
                this.setupEvents();
                this.updateVisual();
            }
            
            setValue(value) {
                this.value = Math.max(this.min, Math.min(this.max, value));
                this.updateVisual();
                if (this.onValueChange) this.onValueChange(this.value);
            }
            
            updateVisual() {
                const percent = (this.value - this.min) / (this.max - this.min);
                const circumference = 2 * Math.PI * 40;
                const offset = circumference * (1 - percent * 0.75) - (circumference * 0.25);
                this.progress.style.strokeDasharray = circumference;
                this.progress.style.strokeDashoffset = offset;
                
                // Rotate handle
                const angle = -135 + (percent * 270);
                this.element.style.transform = `rotate(${angle}deg)`;
            }
            
            setupEvents() {
                const start = (y) => {
                    this.isDragging = true;
                    this.startY = y;
                    this.startValue = this.value;
                    this.element.style.cursor = 'grabbing';
                };
                
                const move = (y) => {
                    if (!this.isDragging) return;
                    const delta = (this.startY - y) * (this.max - this.min) / 200;
                    this.setValue(this.startValue + delta);
                };
                
                const end = () => {
                    this.isDragging = false;
                    this.element.style.cursor = 'grab';
                };
                
                // Mouse events
                this.element.addEventListener('mousedown', (e) => start(e.clientY));
                document.addEventListener('mousemove', (e) => move(e.clientY));
                document.addEventListener('mouseup', end);
                
                // Touch events
                this.element.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    start(e.touches[0].clientY);
                }, { passive: false });
                document.addEventListener('touchmove', (e) => {
                    if (this.isDragging) {
                        e.preventDefault();
                        move(e.touches[0].clientY);
                    }
                }, { passive: false });
                document.addEventListener('touchend', end);
                
                // Keyboard events
                this.element.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowUp' || e.key === 'ArrowRight') {
                        e.preventDefault();
                        this.setValue(this.value + (this.max - this.min) / 50);
                    } else if (e.key === 'ArrowDown' || e.key === 'ArrowLeft') {
                        e.preventDefault();
                        this.setValue(this.value - (this.max - this.min) / 50);
                    }
                });
            }
        }
        
        // ============================================
        // Audio Engine
        // ============================================
        
        const THEME_PALETTES = {
            'magenta-glow': {
                delta: '#A21CAF',
                theta: '#C026D3',
                alpha: '#D946EF',
                beta: '#E879F9',
                gamma: '#F0ABFC'
            },
            'orange-creamsicle': {
                delta: '#C2410C',
                theta: '#EA580C',
                alpha: '#F97316',
                beta: '#FB923C',
                gamma: '#FDBA74'
            },
            'electric-violet': {
                delta: '#4F6EF7',
                theta: '#6D5EF9',
                alpha: '#8B5CF6',
                beta: '#A855F7',
                gamma: '#C084FC'
            },
            'sun-blitzed-yellow': {
                delta: '#CA8A04',
                theta: '#EAB308',
                alpha: '#FACC15',
                beta: '#F59E0B',
                gamma: '#FDE047'
            }
        };

        const state = {
            audioContext: null,
            leftOscillator: null,
            rightOscillator: null,
            gainNode: null,
            analyser: null,
            panner: null,
            lowpassFilter: null,
            waveshaper: null,
            noiseNode: null,
            noiseGain: null,
            noiseFilter: null,
            driftLFO: null,
            driftLFOGain: null,
            isPlaying: false,
            carrierFreq: 200,
            beatFreq: 10,
            volume: 70,
            fadeTime: 2,
            pan: 0,
            warmth: 35,
            lowpassFreq: 800,
            driftAmount: 15,
            noiseVolume: 20,
            noiseEnabled: false,
            waveform: 'sine',
            timerInterval: null,
            presetTimer: null,
            sessionStartTime: null,
            currentTheme: 'electric-violet',
            colors: { ...THEME_PALETTES['electric-violet'] },
            presets: {
                delta: { carrier: 180, beat: 2, state: 'Deep Sleep' },
                theta: { carrier: 200, beat: 6, state: 'Meditation' },
                alpha: { carrier: 210, beat: 10, state: 'Relaxed Focus' },
                beta: { carrier: 220, beat: 20, state: 'Active Thinking' },
                gamma: { carrier: 200, beat: 40, state: 'Peak Awareness' }
            }
        };
        
        let carrierKnob, beatKnob, volumeKnob, fadeKnob, panKnob, warmthKnob, lowpassKnob, driftKnob, noiseKnob;
        
        function initAudioContext() {
            if (!state.audioContext) {
                state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function makeWaveshaperCurve(amount) {
            const samples = 44100;
            const curve = new Float32Array(samples);
            const k = amount / 100;
            const n = 0.001;
            
            for (let i = 0; i < samples; i++) {
                const x = (i * 2) / samples - 1;
                curve[i] = ((1 + k) * x) / (1 + k * Math.abs(x));
            }
            return curve;
        }
        
        function setupWaveshaper() {
            if (state.waveshaper) {
                try { state.waveshaper.disconnect(); } catch(e) {}
            }
            
            state.waveshaper = state.audioContext.createWaveShaper();
            state.waveshaper.curve = makeWaveshaperCurve(state.warmth);
            state.waveshaper.oversample = '4x';
        }
        
        function setupLowpass() {
            if (state.lowpassFilter) {
                try { state.lowpassFilter.disconnect(); } catch(e) {}
            }
            
            state.lowpassFilter = state.audioContext.createBiquadFilter();
            state.lowpassFilter.type = 'lowpass';
            state.lowpassFilter.frequency.value = state.lowpassFreq;
            state.lowpassFilter.Q.value = 0.7;
        }
        
        function setupDriftLFO() {
            if (state.driftLFO) {
                try {
                    state.driftLFO.stop();
                    state.driftLFO.disconnect();
                    if (state.driftLFOGain) state.driftLFOGain.disconnect();
                } catch(e) {}
            }
            
            state.driftLFO = state.audioContext.createOscillator();
            state.driftLFO.frequency.value = 0.2;
            state.driftLFOGain = state.audioContext.createGain();
            state.driftLFOGain.gain.value = state.driftAmount * 0.1;
            
            state.driftLFO.connect(state.driftLFOGain);
            state.driftLFO.start();
            
            // Connect to oscillators if they exist
            if (state.leftOscillator && state.rightOscillator) {
                state.driftLFOGain.connect(state.leftOscillator.frequency);
                state.driftLFOGain.connect(state.rightOscillator.frequency);
            }
        }
        
        function createBrownNoise() {
            const bufferSize = 2 * state.audioContext.sampleRate;
            const buffer = state.audioContext.createBuffer(1, bufferSize, state.audioContext.sampleRate);
            const output = buffer.getChannelData(0);
            
            let lastOut = 0;
            for (let i = 0; i < bufferSize; i++) {
                const white = Math.random() * 2 - 1;
                output[i] = (lastOut + (0.02 * white)) / 1.02;
                lastOut = output[i];
                output[i] *= 3.5;
            }
            return buffer;
        }
        
        function startNoise() {
            if (!state.noiseEnabled || state.noiseNode) return;
            
            state.noiseNode = state.audioContext.createBufferSource();
            state.noiseNode.buffer = createBrownNoise();
            state.noiseNode.loop = true;
            
            state.noiseFilter = state.audioContext.createBiquadFilter();
            state.noiseFilter.type = 'lowpass';
            state.noiseFilter.frequency.value = 400;
            
            state.noiseGain = state.audioContext.createGain();
            state.noiseGain.gain.value = 0;
            
            state.noiseNode.connect(state.noiseFilter);
            state.noiseFilter.connect(state.noiseGain);
            state.noiseGain.connect(state.gainNode);
            state.noiseNode.start();
            
            // Fade in noise
            state.noiseGain.gain.linearRampToValueAtTime(
                state.noiseVolume / 100 * 0.3,
                state.audioContext.currentTime + 0.5
            );
        }
        
        function stopNoise() {
            if (state.noiseGain) {
                try {
                    state.noiseGain.gain.linearRampToValueAtTime(0, state.audioContext.currentTime + 0.3);
                } catch(e) {}
            }
            
            setTimeout(() => {
                if (state.noiseNode) {
                    try {
                        state.noiseNode.stop();
                        state.noiseNode.disconnect();
                        if (state.noiseFilter) state.noiseFilter.disconnect();
                        if (state.noiseGain) state.noiseGain.disconnect();
                    } catch(e) {}
                    state.noiseNode = null;
                    state.noiseFilter = null;
                    state.noiseGain = null;
                }
            }, 350);
        }
        
        function updateNoiseVolume() {
            if (state.noiseGain && state.audioContext) {
                state.noiseGain.gain.setTargetAtTime(
                    state.noiseEnabled ? state.noiseVolume / 100 * 0.3 : 0,
                    state.audioContext.currentTime,
                    0.1
                );
            }
        }
        
        function buildAudioChain() {
            // Build the complete audio chain
            state.leftOscillator.connect(state.gainNode);
            state.rightOscillator.connect(state.gainNode);
            state.gainNode.connect(state.panner);
            state.panner.connect(state.waveshaper);
            state.waveshaper.connect(state.lowpassFilter);
            state.lowpassFilter.connect(state.analyser);
            state.analyser.connect(state.audioContext.destination);
            
            // Connect drift LFO to oscillators
            if (state.driftLFOGain) {
                state.driftLFOGain.connect(state.leftOscillator.frequency);
                state.driftLFOGain.connect(state.rightOscillator.frequency);
            }
        }
        
        function startOscillators() {
            const wasPlaying = state.isPlaying;
            const currentTime = state.audioContext.currentTime;
            
            // Fade out existing oscillators if playing
            if (wasPlaying && state.gainNode) {
                try {
                    state.gainNode.gain.cancelScheduledValues(currentTime);
                    state.gainNode.gain.setValueAtTime(state.gainNode.gain.value, currentTime);
                    state.gainNode.gain.linearRampToValueAtTime(0, currentTime + 0.05);
                } catch(e) {}
            }
            
            // Stop and disconnect old oscillators
            setTimeout(() => {
                if (state.leftOscillator) {
                    try { state.leftOscillator.stop(); } catch(e) {}
                    try { state.leftOscillator.disconnect(); } catch(e) {}
                    state.leftOscillator = null;
                }
                if (state.rightOscillator) {
                    try { state.rightOscillator.stop(); } catch(e) {}
                    try { state.rightOscillator.disconnect(); } catch(e) {}
                    state.rightOscillator = null;
                }
                
                // Create new oscillators
                const leftFreq = state.carrierFreq + state.beatFreq / 2;
                const rightFreq = state.carrierFreq - state.beatFreq / 2;
                
                state.leftOscillator = state.audioContext.createOscillator();
                state.rightOscillator = state.audioContext.createOscillator();
                
                state.leftOscillator.type = state.waveform;
                state.rightOscillator.type = state.waveform;
                state.leftOscillator.frequency.value = leftFreq;
                state.rightOscillator.frequency.value = rightFreq;
                
                // Create nodes if they don't exist
                if (!state.gainNode) state.gainNode = state.audioContext.createGain();
                if (!state.analyser) {
                    state.analyser = state.audioContext.createAnalyser();
                    state.analyser.fftSize = 2048;
                }
                if (!state.panner) state.panner = state.audioContext.createStereoPanner();
                
                state.gainNode.gain.value = 0;
                state.panner.pan.value = state.pan;
                
                setupLowpass();
                setupWaveshaper();
                setupDriftLFO();
                
                buildAudioChain();
                
                // Start oscillators
                state.leftOscillator.start();
                state.rightOscillator.start();
                
                // Fade in
                const fadeTime = Math.max(0.05, state.fadeTime);
                state.gainNode.gain.setValueAtTime(0, currentTime + 0.05);
                state.gainNode.gain.linearRampToValueAtTime(state.volume / 100, currentTime + 0.05 + fadeTime);
                
                // Start noise if enabled
                if (state.noiseEnabled) {
                    startNoise();
                }
            }, wasPlaying ? 100 : 0);
        }
        
        function stopOscillators() {
            const fadeTime = state.fadeTime;
            const currentTime = state.audioContext.currentTime;
            
            if (state.gainNode) {
                try {
                    state.gainNode.gain.cancelScheduledValues(currentTime);
                    state.gainNode.gain.setValueAtTime(state.gainNode.gain.value, currentTime);
                    state.gainNode.gain.linearRampToValueAtTime(0, currentTime + fadeTime);
                } catch(e) {}
            }
            
            setTimeout(() => {
                if (state.leftOscillator) {
                    try {
                        state.leftOscillator.stop();
                        state.leftOscillator.disconnect();
                    } catch(e) {}
                    state.leftOscillator = null;
                }
                if (state.rightOscillator) {
                    try {
                        state.rightOscillator.stop();
                        state.rightOscillator.disconnect();
                    } catch(e) {}
                    state.rightOscillator = null;
                }
                if (state.driftLFO) {
                    try {
                        state.driftLFO.stop();
                        state.driftLFO.disconnect();
                        if (state.driftLFOGain) state.driftLFOGain.disconnect();
                    } catch(e) {}
                    state.driftLFO = null;
                    state.driftLFOGain = null;
                }
                stopNoise();
            }, fadeTime * 1000 + 50);
        }
        
        function updateMasterVolume() {
            if (state.gainNode && state.audioContext) {
                state.gainNode.gain.setTargetAtTime(
                    state.volume / 100,
                    state.audioContext.currentTime,
                    0.1
                );
            }
        }
        
        function updatePan() {
            if (state.panner && state.audioContext) {
                state.panner.pan.setTargetAtTime(state.pan, state.audioContext.currentTime, 0.1);
            }
        }
        
        function updateWarmth() {
            if (state.audioContext && state.waveshaper) {
                state.waveshaper.curve = makeWaveshaperCurve(state.warmth);
            }
        }
        
        function updateLowpass() {
            if (state.lowpassFilter && state.audioContext) {
                state.lowpassFilter.frequency.setTargetAtTime(state.lowpassFreq, state.audioContext.currentTime, 0.1);
            }
        }
        
        // ============================================
        // Visualizer
        // ============================================
        
        let visualizerAnimationId = null;
        let visualizerCanvas, visualizerCtx;
        
        function initVisualizer() {
            visualizerCanvas = document.getElementById('visualizer');
            const container = visualizerCanvas.parentElement;
            const rect = container.getBoundingClientRect();
            
            visualizerCanvas.width = rect.width * window.devicePixelRatio;
            visualizerCanvas.height = rect.height * window.devicePixelRatio;
            
            visualizerCtx = visualizerCanvas.getContext('2d');
            visualizerCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
            
            drawVisualizer();
        }
        
        function drawVisualizer() {
            const width = visualizerCanvas.width / window.devicePixelRatio;
            const height = visualizerCanvas.height / window.devicePixelRatio;
            
            visualizerCtx.clearRect(0, 0, width, height);
            
            if (!state.analyser) {
                // Draw idle state
                visualizerCtx.fillStyle = 'rgba(255,255,255,0.02)';
                visualizerCtx.fillRect(0, height / 2 - 1, width, 2);
                visualizerAnimationId = requestAnimationFrame(drawVisualizer);
                return;
            }
            
            const bufferLength = state.analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            state.analyser.getByteTimeDomainData(dataArray);
            
            const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
            visualizerCtx.strokeStyle = accent;
            visualizerCtx.lineWidth = 2;
            visualizerCtx.shadowBlur = 12;
            visualizerCtx.shadowColor = accent;
            
            visualizerCtx.beginPath();
            
            const sliceWidth = width / bufferLength;
            let x = 0;
            
            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = v * height / 2;
                
                if (i === 0) {
                    visualizerCtx.moveTo(x, y);
                } else {
                    visualizerCtx.lineTo(x, y);
                }
                
                x += sliceWidth;
            }
            
            visualizerCtx.lineTo(width, height / 2);
            visualizerCtx.stroke();
            
            visualizerCtx.shadowBlur = 0;
            
            visualizerAnimationId = requestAnimationFrame(drawVisualizer);
        }
        
        // ============================================
        // Brainwave State Badge
        // ============================================
        
        function hexToRgb(hex) {
            const normalized = hex.replace('#', '').trim();
            const value = normalized.length === 3
                ? normalized.split('').map(char => char + char).join('')
                : normalized;

            return {
                r: parseInt(value.slice(0, 2), 16),
                g: parseInt(value.slice(2, 4), 16),
                b: parseInt(value.slice(4, 6), 16)
            };
        }

        function getAccentContrast(hex) {
            const { r, g, b } = hexToRgb(hex);
            const yiq = (r * 299 + g * 587 + b * 114) / 1000;
            return yiq >= 160 ? '#0A0A0F' : '#FFFFFF';
        }

        function getBrainwaveStateDetails(beat = state.beatFreq) {
            if (beat < 4) {
                return { key: 'delta', name: 'DELTA', color: state.colors.delta };
            }

            if (beat < 8) {
                return { key: 'theta', name: 'THETA', color: state.colors.theta };
            }

            if (beat < 13) {
                return { key: 'alpha', name: 'ALPHA', color: state.colors.alpha };
            }

            if (beat < 30) {
                return { key: 'beta', name: 'BETA', color: state.colors.beta };
            }

            return { key: 'gamma', name: 'GAMMA', color: state.colors.gamma };
        }

        function applyTheme(themeName) {
            const palette = THEME_PALETTES[themeName];
            if (!palette) {
                return;
            }

            state.currentTheme = themeName;
            state.colors = { ...palette };

            document.documentElement.style.setProperty('--accent-delta', palette.delta);
            document.documentElement.style.setProperty('--accent-theta', palette.theta);
            document.documentElement.style.setProperty('--accent-alpha', palette.alpha);
            document.documentElement.style.setProperty('--accent-beta', palette.beta);
            document.documentElement.style.setProperty('--accent-gamma', palette.gamma);

            document.querySelectorAll('.theme-btn').forEach(btn => {
                const isActive = btn.dataset.theme === themeName;
                btn.classList.toggle('active', isActive);
                btn.setAttribute('aria-pressed', String(isActive));
            });

            updateBrainwaveBadge();
        }

        function updateBrainwaveBadge() {
            const beat = state.beatFreq;
            const activeState = getBrainwaveStateDetails(beat);
            const stateName = activeState.name;
            const stateColor = activeState.color;
            const accentContrast = getAccentContrast(stateColor);
            
            document.documentElement.style.setProperty('--accent', stateColor);
            document.documentElement.style.setProperty('--accent-contrast', accentContrast);
            
            const badge = document.querySelector('.state-badge .state-text');
            const dot = document.querySelector('.state-dot');
            
            if (state.isPlaying) {
                badge.textContent = `${stateName} — ${beat.toFixed(1)} Hz`;
            } else {
                badge.textContent = 'READY';
            }
            
            dot.style.background = stateColor;
            dot.style.boxShadow = `0 0 12px ${stateColor}`;
            
            const label = document.getElementById('brainwaveLabel');
            label.textContent = `${stateName} — ${beat.toFixed(1)} Hz Beat Frequency`;
            label.style.color = stateColor;
            
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.state === activeState.key) {
                    btn.classList.add('active');
                }
            });
        }
        
        // ============================================
        // L/R Frequency Display
        // ============================================
        
        function updateLRDisplay() {
            const leftFreq = state.carrierFreq + state.beatFreq / 2;
            const rightFreq = state.carrierFreq - state.beatFreq / 2;
            
            document.getElementById('leftFreq').textContent = leftFreq.toFixed(1);
            document.getElementById('rightFreq').textContent = rightFreq.toFixed(1);
        }
        
        // ============================================
        // Timer System
        // ============================================
        
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        function startSessionTimer() {
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
            }
            
            state.sessionStartTime = Date.now();
            
            state.timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - state.sessionStartTime) / 1000);
                document.getElementById('timerDisplay').textContent = formatTime(elapsed);
            }, 1000);
        }
        
        function stopSessionTimer() {
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }
            document.getElementById('timerDisplay').textContent = '00:00';
        }
        
        function setPresetTimer(minutes) {
            if (state.presetTimer) {
                clearInterval(state.presetTimer);
            }
            
            document.querySelectorAll('.timer-btn').forEach(btn => {
                btn.classList.remove('active');
                if (parseInt(btn.dataset.timer) === minutes) {
                    btn.classList.add('active');
                }
            });
            
            const totalSeconds = minutes * 60;
            let remaining = totalSeconds;
            
            document.getElementById('countdownDisplay').textContent = formatTime(remaining);
            document.getElementById('timerOverlay').classList.add('visible');
            
            state.presetTimer = setInterval(() => {
                remaining--;
                document.getElementById('countdownDisplay').textContent = formatTime(remaining);
                
                if (remaining <= 0) {
                    clearInterval(state.presetTimer);
                    state.presetTimer = null;
                    document.getElementById('timerOverlay').classList.remove('visible');
                    stopAudio();
                }
            }, 1000);
        }
        
        function clearPresetTimer() {
            if (state.presetTimer) {
                clearInterval(state.presetTimer);
                state.presetTimer = null;
            }
            document.getElementById('timerOverlay').classList.remove('visible');
            document.querySelectorAll('.timer-btn').forEach(btn => {
                btn.classList.remove('active');
            });
        }
        
        // ============================================
        // Play/Stop Control
        // ============================================
        
        function playAudio() {
            initAudioContext();
            
            if (state.audioContext.state === 'suspended') {
                state.audioContext.resume();
            }
            
            state.isPlaying = true;
            startOscillators();
            startSessionTimer();
            
            document.getElementById('playBtn').classList.add('playing');
            document.getElementById('playBtnText').textContent = '■ STOP';
            
            updateBrainwaveBadge();
        }
        
        function stopAudio() {
            state.isPlaying = false;
            stopOscillators();
            stopSessionTimer();
            
            document.getElementById('playBtn').classList.remove('playing');
            document.getElementById('playBtnText').textContent = '▶ PLAY';
            document.querySelector('.state-badge .state-text').textContent = 'READY';
            
            updateBrainwaveBadge();
        }
        
        function togglePlay() {
            if (state.isPlaying) {
                stopAudio();
            } else {
                playAudio();
            }
        }
        
        function getBrainwaveName(beat) {
            if (beat < 4) return 'DELTA';
            if (beat < 8) return 'THETA';
            if (beat < 13) return 'ALPHA';
            if (beat < 30) return 'BETA';
            return 'GAMMA';
        }

        // ============================================
        // Initialize
        // ============================================
        
        document.addEventListener('DOMContentLoaded', () => {
            initVisualizer();
            applyTheme(state.currentTheme);
            updateLRDisplay();
            
            carrierKnob = new Knob(document.getElementById('carrierKnob'));
            carrierKnob.min = 40;
            carrierKnob.max = 500;
            carrierKnob.onValueChange = (val) => {
                state.carrierFreq = val;
                if (state.isPlaying) startOscillators();
                updateLRDisplay();
            };
            
            beatKnob = new Knob(document.getElementById('beatKnob'));
            beatKnob.min = 0.5;
            beatKnob.max = 50;
            beatKnob.onValueChange = (val) => {
                state.beatFreq = val;
                if (state.isPlaying) startOscillators();
                updateLRDisplay();
                updateBrainwaveBadge();
            };
            
            volumeKnob = new Knob(document.getElementById('volumeKnob'));
            volumeKnob.onValueChange = (val) => {
                state.volume = val;
                updateMasterVolume();
            };
            
            fadeKnob = new Knob(document.getElementById('fadeKnob'));
            fadeKnob.min = 0;
            fadeKnob.max = 10;
            fadeKnob.onValueChange = (val) => {
                state.fadeTime = val;
            };
            
            panKnob = new Knob(document.getElementById('panKnob'));
            panKnob.min = -1;
            panKnob.max = 1;
            panKnob.onValueChange = (val) => {
                state.pan = val;
                updatePan();
            };
            
            warmthKnob = new Knob(document.getElementById('warmthKnob'));
            warmthKnob.min = 0;
            warmthKnob.max = 100;
            warmthKnob.onValueChange = (val) => {
                state.warmth = val;
                updateWarmth();
            };
            
            lowpassKnob = new Knob(document.getElementById('lowpassKnob'));
            lowpassKnob.min = 200;
            lowpassKnob.max = 1200;
            lowpassKnob.onValueChange = (val) => {
                state.lowpassFreq = val;
                updateLowpass();
            };
            
            driftKnob = new Knob(document.getElementById('driftKnob'));
            driftKnob.min = 0;
            driftKnob.max = 100;
            driftKnob.onValueChange = (val) => {
                state.driftAmount = val;
                if (state.isPlaying) {
                    setupDriftLFO();
                }
            };
            
            noiseKnob = new Knob(document.getElementById('noiseKnob'));
            noiseKnob.onValueChange = (val) => {
                state.noiseVolume = val;
                updateNoiseVolume();
            };
        });
        
        window.addEventListener('beforeunload', () => {
            stopAudio();
            if (state.audioContext) {
                state.audioContext.close();
            }
        });
    </script>
</body>
</html>
