<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINARUAL — Binaural Beats Synthesizer</title>
    <style>
        :root {
            --accent: #4F6EF7;
            --accent-delta: #4F6EF7;
            --accent-theta: #A855F7;
            --accent-alpha: #22D3EE;
            --accent-beta: #F59E0B;
            --accent-gamma: #F43F5E;
            --bg-dark: #0A0A0F;
            --glass-bg: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.08);
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255,255,255,0.6);
            --shadow-inner: inset 0 1px 0 rgba(255,255,255,0.1);
            --shadow-outer: 0 8px 32px rgba(0,0,0,0.4);
            --knob-size: 80px;
            --knob-size-sm: 60px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background blobs */
        .bg-blobs {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: blob-pulse 20s ease-in-out infinite;
        }

        .blob-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-theta) 0%, transparent 70%);
            top: 50%;
            right: -150px;
            animation-delay: -7s;
        }

        .blob-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent-alpha) 0%, transparent 70%);
            bottom: -100px;
            left: 30%;
            animation-delay: -14s;
        }

        @keyframes blob-pulse {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -50px) scale(1.1); }
            50% { transform: translate(-30px, 30px) scale(0.95); }
            75% { transform: translate(-50px, -30px) scale(1.05); }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--shadow-outer);
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .app-name {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 11px;
            color: var(--text-secondary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .state-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            border: 1px solid var(--glass-border);
        }

        .state-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent);
        }

        .state-text {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Visualizer */
        .visualizer-container {
            margin-bottom: 24px;
            padding: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--shadow-outer);
        }

        .visualizer {
            width: 100%;
            height: 120px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            border: 1px solid var(--glass-border);
        }

        /* Grid layouts */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 24px;
        }

        .panel {
            padding: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--shadow-outer);
        }

        /* Preset strip */
        .preset-strip {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .preset-btn {
            flex: 1;
            min-width: 80px;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .preset-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .preset-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent);
        }

        .preset-btn:active {
            transform: translateY(2px);
        }

        /* L/R Display panel */
        .lr-display-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .lr-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            border: 1px solid var(--glass-border);
        }

        .lr-value {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 24px;
            font-weight: 500;
            tabular-nums: true;
        }

        .lr-label {
            font-size: 10px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .brainwave-label {
            font-size: 11px;
            color: var(--accent);
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Knob styles */
        .knob-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 24px;
        }

        .knob-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .knob {
            width: var(--knob-size);
            height: var(--knob-size);
            position: relative;
            cursor: grab;
            touch-action: none;
        }

        .knob:active {
            cursor: grabbing;
        }

        .knob svg {
            width: 100%;
            height: 100%;
            transform: rotate(-135deg);
        }

        .knob-bg {
            fill: none;
            stroke: rgba(255,255,255,0.1);
            stroke-width: 8;
        }

        .knob-progress {
            fill: none;
            stroke: var(--accent);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke 0.3s ease;
        }

        .knob-handle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            background: var(--text-primary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .knob-handle::after {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 18px;
            background: var(--text-primary);
            border-radius: 1px;
        }

        .knob-label {
            font-size: 10px;
            color: var(--text-secondary);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-align: center;
        }

        .knob-value {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 16px;
            font-weight: 500;
            color: var(--accent);
            tabular-nums: true;
        }

        .knob-unit {
            font-size: 10px;
            color: var(--text-secondary);
        }

        /* Smaller knobs */
        .knob-sm .knob {
            width: var(--knob-size-sm);
            height: var(--knob-size-sm);
        }

        .knob-sm .knob-label {
            font-size: 9px;
        }

        .knob-sm .knob-value {
            font-size: 14px;
        }

        /* Waveform selector */
        .waveform-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .waveform-btn {
            flex: 1;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .waveform-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .waveform-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent);
        }

        .waveform-btn:active {
            transform: translateY(2px);
        }

        /* Timer section */
        .timer-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
            margin-bottom: 24px;
        }

        .timer-presets {
            display: flex;
            gap: 8px;
        }

        .timer-btn {
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .timer-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .timer-btn.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        .timer-btn:active {
            transform: translateY(2px);
        }

        .timer-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .timer-value {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 32px;
            font-weight: 500;
            color: var(--accent);
            tabular-nums: true;
        }

        .timer-label {
            font-size: 10px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Countdown overlay */
        .countdown-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .countdown-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .countdown-value {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 18px;
            color: var(--accent);
        }

        /* Main controls */
        .main-controls {
            display: flex;
            justify-content: center;
            gap: 24px;
        }

        .play-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: white;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 40px var(--accent);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px var(--accent);
        }

        .play-btn:active {
            transform: scale(0.98);
        }

        .play-btn.playing {
            background: #FF4444;
            box-shadow: 0 0 40px #FF4444;
        }

        .play-btn.playing:hover {
            box-shadow: 0 0 60px #FF4444;
        }

        .play-icon {
            font-size: 24px;
        }

        .reset-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .reset-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .reset-btn:active {
            transform: translateY(2px);
        }

        /* Noise controls */
        .noise-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .noise-toggle {
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .noise-toggle.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .grid-4 {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .knob-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
            
            .grid-2, .grid-4, .knob-row {
                grid-template-columns: 1fr;
            }
            
            .timer-section {
                flex-direction: column;
            }
            
            .preset-strip {
                justify-content: center;
            }
            
            .waveform-selector {
                flex-wrap: wrap;
            }
            
            .waveform-btn {
                flex: 0 1 calc(50% - 4px);
            }
        }
    </style>
</head>
<body>
    <!-- Animated background -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <h1 class="app-name">BINARUAL</h1>
                <p class="tagline">Binaural Beats Synthesizer</p>
            </div>
            <div class="state-badge">
                <div class="state-dot"></div>
                <span class="state-text">READY</span>
            </div>
        </header>

        <!-- Visualizer -->
        <div class="visualizer-container">
            <canvas id="visualizer" class="visualizer"></canvas>
        </div>

        <!-- Preset Strip -->
        <div class="panel">
            <div class="preset-strip">
                <button class="preset-btn" data-preset="delta" data-state="delta">DELTA<br>Deep Sleep</button>
                <button class="preset-btn" data-preset="theta" data-state="theta">THETA<br>Meditation</button>
                <button class="preset-btn active" data-preset="alpha" data-state="alpha">ALPHA<br>Relaxed Focus</button>
                <button class="preset-btn" data-preset="beta" data-state="beta">BETA<br>Active Thinking</button>
                <button class="preset-btn" data-preset="gamma" data-state="gamma">GAMMA<br>Peak Awareness</button>
            </div>
        </div>

        <!-- L/R Display Panel -->
        <div class="grid-2">
            <div class="panel lr-display-panel">
                <div class="lr-display">
                    <div>
                        <div class="lr-label">LEFT</div>
                        <div class="lr-value"><span id="leftFreq">205.0</span> Hz</div>
                    </div>
                    <div style="text-align: right;">
                        <div class="lr-label">RIGHT</div>
                        <div class="lr-value"><span id="rightFreq">195.0</span> Hz</div>
                    </div>
                </div>
                <div class="brainwave-label" id="brainwaveLabel">ALPHA — 10.0 Hz Beat Frequency</div>
            </div>

            <!-- Noise Controls -->
            <div class="panel">
                <div class="noise-controls">
                    <button class="noise-toggle" id="noiseToggle">NOISE: OFF</button>
                    <div class="knob-container knob-sm">
                        <div class="knob" data-min="0" data-max="100" data-value="20" data-unit="%" id="noiseKnob">
                            <svg viewBox="0 0 100 100">
                                <circle class="knob-bg" cx="50" cy="50" r="40" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
                                <circle class="knob-progress" id="noiseProgress" cx="50" cy="50" r="40" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
                            </svg>
                            <div class="knob-handle"></div>
                        </div>
                        <div class="knob-label">Noise Level</div>
                        <div class="knob-value"><span id="noiseValue">20</span><span class="knob-unit">%</span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Knob Row 1: Main Controls -->
        <div class="knob-row">
            <div class="knob-container">
                <div class="knob" data-min="40" data-max="500" data-value="200" data-unit="Hz" id="carrierKnob">
                    <svg viewBox="0 0 100 100">
                        <circle class="knob-bg" cx="50" cy="50" r="40" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
                        <circle class="knob-progress" id="carrierProgress" cx="50" cy="50" r="40" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
                    </svg>
                    <div class="knob-handle"></div>
                </div>
                <div class="knob-label">Carrier</div>
                <div class="knob-value"><span id="carrierValue">200</span><span class="knob-unit">Hz</span></div>
            </div>

            <div class="knob-container">
                <div class="knob" data-min="0.5" data-max="50" data-value="10" data-unit="Hz" id="beatKnob">
                    <svg viewBox="0 0 100 100">
                        <circle class="knob-bg" cx="50" cy="50" r="40" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
                        <circle class="knob-progress" id="beatProgress" cx="50" cy="50" r="40" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
                    </svg>
                    <div class="knob-handle"></div>
                </div>
                <div class="knob-label">Beat Δ</div>
                <div class="knob-value"><span id="beatValue">10.0</span><span class="knob-unit">Hz</span></div>
            </div>

            <div class="knob-container">
                <div class="knob" data-min="0" data-max="100" data-value="70" data-unit="%" id="volumeKnob">
                    <svg viewBox="0 0 100 100">
                        <circle class="knob-bg" cx="50" cy="50" r="40" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
                        <circle class="knob-progress" id="volumeProgress" cx="50" cy="50" r="40" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
                    </svg>
                    <div class="knob-handle"></div>
                </div>
                <div class="knob-label">Volume</div>
                <div class="knob-value"><span id="volumeValue">70</span><span class="knob-unit">%</span></div>
            </div>

            <div class="knob-container">
                <div class="knob" data-min="0" data-max="10" data-value="2" data-unit="s" id="fadeKnob">
                    <svg viewBox="0 0 100 100">
                        <circle class="knob-bg" cx="50" cy="50" r="40" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
                        <circle class="knob-progress" id="fadeProgress" cx="50" cy="50" r="40" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
                    </svg>
                    <div class="knob-handle"></div>
                </div>
                <div class="knob-label">Fade</div>
                <div class="knob-value"><span id="fadeValue">2.0</span><span class="knob-unit">s</span></div>
            </div>
        </div>

        <!-- Knob Row 2: Pan & Warmth -->
        <div class="knob-row">
            <div class="knob-container">
                <div class="knob" data-min="-1" data-max="1" data-value="0" data-unit="" id="panKnob">
                    <svg viewBox="0 0 100 100">
                        <circle class="knob-bg" cx="50" cy="50" r="40" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
                        <circle class="knob-progress" id="panProgress" cx="50" cy="50" r="40" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
                    </svg>
                    <div class="knob-handle"></div>
                </div>
                <div class="knob-label">Stereo Pan</div>
                <div class="knob-value"><span id="panValue">0.00</span></div>
            </div>

            <div class="knob-container">
                <div class="knob" data-min="0" data-max="100" data-value="35" data-unit="" id="warmthKnob">
                    <svg viewBox="0 0 100 100">
                        <circle class="knob-bg" cx="50" cy="50" r="40" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
                        <circle class="knob-progress" id="warmthProgress" cx="50" cy="50" r="40" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
                    </svg>
                    <div class="knob-handle"></div>
                </div>
                <div class="knob-label">Harmonic Warmth</div>
                <div class="knob-value"><span id="warmthValue">35</span></div>
            </div>

            <div class="knob-container">
                <div class="knob" data-min="200" data-max="1200" data-value="800" data-unit="Hz" id="lowpassKnob">
                    <svg viewBox="0 0 100 100">
                        <circle class="knob-bg" cx="50" cy="50" r="40" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
                        <circle class="knob-progress" id="lowpassProgress" cx="50" cy="50" r="40" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
                    </svg>
                    <div class="knob-handle"></div>
                </div>
                <div class="knob-label">Lowpass Filter</div>
                <div class="knob-value"><span id="lowpassValue">800</span><span class="knob-unit">Hz</span></div>
            </div>

            <div class="knob-container">
                <div class="knob" data-min="0" data-max="100" data-value="15" data-unit="" id="driftKnob">
                    <svg viewBox="0 0 100 100">
                        <circle class="knob-bg" cx="50" cy="50" r="40" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
                        <circle class="knob-progress" id="driftProgress" cx="50" cy="50" r="40" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
                    </svg>
                    <div class="knob-handle"></div>
                </div>
                <div class="knob-label">Organic Drift</div>
                <div class="knob-value"><span id="driftValue">15</span></div>
            </div>
        </div>

        <!-- Waveform Selector -->
        <div class="waveform-selector">
            <button class="waveform-btn active" data-waveform="sine">SINE</button>
            <button class="waveform-btn" data-waveform="triangle">TRIANGLE</button>
            <button class="waveform-btn" data-waveform="square">SQUARE</button>
            <button class="waveform-btn" data-waveform="sawtooth">SAW</button>
        </div>

        <!-- Timer Section -->
        <div class="panel timer-section">
            <div class="timer-presets">
                <button class="timer-btn" data-timer="5">5 MIN</button>
                <button class="timer-btn" data-timer="15">15 MIN</button>
                <button class="timer-btn" data-timer="30">30 MIN</button>
            </div>
            <div class="timer-display">
                <div class="timer-value" id="timerDisplay">00:00</div>
                <div class="timer-label">Session Timer</div>
                <div class="countdown-overlay" id="timerOverlay">
                    <span class="countdown-value" id="countdownDisplay">00:00</span>
                </div>
            </div>

        <!-- Main Controls -->
        <div class="main-controls">
            <button class="reset-btn" id="resetBtn" aria-label="Reset all controls">↺</button>
            <button class="play-btn" id="playBtn" aria-label="Play or stop">
                <span class="play-icon">▶</span>
                <span id="playBtnText">PLAY</span>
            </button>
            <div style="width: 60px;"></div>
        </div>
    </div>

    <script>
        // ============================================
        // State Management
        // ============================================

        const state = {
            audioContext: null,
            leftOscillator: null,
            rightOscillator: null,
            leftGain: null,
            rightGain: null,
            panner: null,
            masterGain: null,
            analyser: null,
            lowpassFilter: null,
            waveshaper: null,
            noiseNode: null,
            noiseBuffer: null,
            noiseFilter: null,
            noiseGain: null,
            driftLFO: null,
            driftLFOGain: null,
            
            isPlaying: false,
            carrierFreq: 200,
            beatFreq: 10,
            volume: 70,
            fadeTime: 2,
            pan: 0,
            warmth: 35,
            lowpassFreq: 800,
            driftAmount: 15,
            noiseEnabled: false,
            noiseVolume: 20,
            waveform: 'sine',
            
            timerInterval: null,
            presetTimer: null,
            sessionStartTime: null,
            
            colors: {
                delta: '#4F6EF7',
                theta: '#A855F7',
                alpha: '#22D3EE',
                beta: '#F59E0B',
                gamma: '#F43F5E'
            },
            
            presets: {
                delta: { carrier: 180, beat: 2, state: 'Deep Sleep' },
                theta: { carrier: 200, beat: 6, state: 'Meditation' },
                alpha: { carrier: 210, beat: 10, state: 'Relaxed Focus' },
                beta: { carrier: 220, beat: 20, state: 'Active Thinking' },
                gamma: { carrier: 200, beat: 40, state: 'Peak Awareness' }
            }
        };

        let carrierKnob, beatKnob, volumeKnob, fadeKnob, panKnob, warmthKnob, lowpassKnob, driftKnob, noiseKnob;

        // ============================================
        // Audio Engine
        // ============================================

        function initAudioContext() {
            if (state.audioContext) return;
            
            state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            // Create master gain
            state.masterGain = state.audioContext.createGain();
            state.masterGain.gain.value = state.volume / 100;
            
            // Create analyser for visualizer
            state.analyser = state.audioContext.createAnalyser();
            state.analyser.fftSize = 2048;
            state.analyser.smoothingTimeConstant = 0.8;
            
            // Create lowpass filter for warmth (removes harsh high frequencies)
            // Lower Q for smoother, more musical rolloff
            state.lowpassFilter = state.audioContext.createBiquadFilter();
            state.lowpassFilter.type = 'lowpass';
            state.lowpassFilter.frequency.value = state.lowpassFreq;
            state.lowpassFilter.Q.value = 0.5;
            
            // HIGH-SHELF FILTER: Reduce harsh frequencies above 8kHz
            // Critical for pleasant high-frequency carrier tones
            state.highShelfFilter = state.audioContext.createBiquadFilter();
            state.highShelfFilter.type = 'highshelf';
            state.highShelfFilter.frequency.value = 8000;
            state.highShelfFilter.gain.value = -8;
            state.highShelfFilter.Q.value = 0.707;
            
            // Create waveshaper for harmonic warmth (subtle saturation)
            state.waveshaper = state.audioContext.createWaveShaper();
            state.waveshaper.curve = createWarmthCurve(state.warmth);
            state.waveshaper.oversample = '4x';
            
            // Connect chain: waveshaper -> highshelf -> lowpass -> master -> analyser -> destination
            state.waveshaper.connect(state.highShelfFilter);
            state.highShelfFilter.connect(state.lowpassFilter);
            state.lowpassFilter.connect(state.masterGain);
            state.masterGain.connect(state.analyser);
            state.analyser.connect(state.audioContext.destination);
            
            // Create brown noise buffer
            createNoiseBuffer();
        }

        function createWarmthCurve(amount) {
            // Premium-grade soft-clipping curve with even harmonic generation
            // Based on professional audio plugin design (FabFilter, Soundtoys)
            const curve = new Float32Array(4096);
            const k = typeof amount === 'number' ? Math.min(amount, 100) / 50 : 0;
            const n = 4096;
            
            for (let i = 0; i < n; i++) {
                const x = (i * 2) / n - 1;
                // Soft saturation curve - preserves transients while adding warmth
                // tanh-like curve with adjustable saturation
                const saturation = 1 + k * 0.5;
                curve[i] = Math.tanh(x * saturation) / Math.tanh(saturation);
            }
            return curve;
        }

        function createNoiseBuffer() {
            if (!state.audioContext) return;
            
            const bufferSize = state.audioContext.sampleRate * 4; // 4 seconds for longer loop
            state.noiseBuffer = state.audioContext.createBuffer(1, bufferSize, state.audioContext.sampleRate);
            const output = state.noiseBuffer.getChannelData(0);
            
            // Generate premium brown noise with spectral shaping
            // Brown noise has -6dB/octave rolloff for deepest warmth
            let lastOut = 0;
            let accumulated = 0;
            
            for (let i = 0; i < bufferSize; i++) {
                const white = Math.random() * 2 - 1;
                
                // Brown noise integration with gentle high-frequency suppression
                accumulated += (lastOut + (0.02 * white)) / 1.02;
                lastOut = accumulated;
                
                // Apply gentle lowpass to remove any remaining harshness
                const smoothed = output[i > 0 ? i - 1 : 0] * 0.9 + lastOut * 0.1;
                output[i] = smoothed * 2.5; // Compensate for gain loss
            }
            
            // Crossfade the ends for seamless looping
            const fadeLength = Math.floor(bufferSize * 0.01); // 1% fade
            for (let i = 0; i < fadeLength; i++) {
                const fade = i / fadeLength;
                output[i] *= fade;
                output[bufferSize - fadeLength + i] *= (1 - fade);
            }
        }

        function startOscillators() {
            if (!state.audioContext) return;
            
            // Disconnect old oscillators
            if (state.leftOscillator) {
                try { state.leftOscillator.stop(); } catch(e) {}
                try { state.leftOscillator.disconnect(); } catch(e) {}
            }
            if (state.rightOscillator) {
                try { state.rightOscillator.stop(); } catch(e) {}
                try { state.rightOscillator.disconnect(); } catch(e) {}
            }
            
            // Calculate L/R frequencies (binaural beat = difference)
            const leftFreq = state.carrierFreq + state.beatFreq / 2;
            const rightFreq = state.carrierFreq - state.beatFreq / 2;
            
            // Create oscillators with selected waveform
            state.leftOscillator = state.audioContext.createOscillator();
            state.rightOscillator = state.audioContext.createOscillator();
            state.leftOscillator.type = state.waveform;
            state.rightOscillator.type = state.waveform;
            
            // Set frequencies with phase coherence (start at same phase point)
            state.leftOscillator.frequency.value = leftFreq;
            state.rightOscillator.frequency.value = rightFreq;
            
            // Create individual gains for fade
            state.leftGain = state.audioContext.createGain();
            state.rightGain = state.audioContext.createGain();
            state.leftGain.gain.value = 0;
            state.rightGain.gain.value = 0;
            
            // Create stereo panner
            state.panner = state.audioContext.createStereoPanner();
            state.panner.pan.value = state.pan;
            
            // Connect left channel
            state.leftOscillator.connect(state.leftGain);
            state.leftGain.connect(state.panner);
            
            // Connect right channel
            state.rightOscillator.connect(state.rightGain);
            state.rightGain.connect(state.panner);
            
            // Connect panner to warmth chain
            state.panner.connect(state.waveshaper);
            
            // Start oscillators
            state.leftOscillator.start();
            state.rightOscillator.start();
            
            // Add organic drift if enabled
            if (state.driftAmount > 0) {
                setupDriftLFO();
            }
            
            // DYNAMIC LOWPASS: Adjust filter frequency based on carrier for optimal pleasantness
            // Higher carriers need higher cutoff, but never exceed pleasant range
            const optimalLowpass = Math.min(
                state.carrierFreq * 2.5, // Scale with carrier
                Math.max(state.lowpassFreq, 400), // Respect user setting, minimum 400Hz
                1200 // Hard ceiling for comfort
            );
            if (state.lowpassFilter && state.audioContext) {
                state.lowpassFilter.frequency.setTargetAtTime(
                    optimalLowpass,
                    state.audioContext.currentTime,
                    0.1
                );
            }
            
            // Fade in
            const fadeTime = state.isPlaying ? state.fadeTime : 0.1;
            const currentTime = state.audioContext.currentTime;
            state.leftGain.gain.linearRampToValueAtTime(0.5, currentTime + fadeTime);
            state.rightGain.gain.linearRampToValueAtTime(0.5, currentTime + fadeTime);
            
            // Start noise if enabled
            if (state.noiseEnabled) {
                startNoise();
            }
            
            // Update displays
            updateLRDisplay();
        }

        function setupDriftLFO() {
            // Create a very slow LFO for organic frequency drift
            if (state.driftLFO) {
                try { state.driftLFO.stop(); } catch(e) {}
                try { state.driftLFO.disconnect(); } catch(e) {}
            }
            
            state.driftLFO = state.audioContext.createOscillator();
            state.driftLFOGain = state.audioContext.createGain();
            
            // Very slow drift (0.1-0.3 Hz for natural feel)
            state.driftLFO.frequency.value = 0.2;
            state.driftLFO.type = 'sine';
            
            // Drift amount in Hz (max 2-3 Hz based on setting)
            const maxDrift = (state.driftAmount / 100) * 3;
            state.driftLFOGain.gain.value = maxDrift;
            
            state.driftLFO.connect(state.driftLFOGain);
            
            // Connect to oscillator frequencies
            if (state.leftOscillator) {
                state.driftLFOGain.connect(state.leftOscillator.frequency);
            }
            if (state.rightOscillator) {
                state.driftLFOGain.connect(state.rightOscillator.frequency);
            }
            
            state.driftLFO.start();
        }

        function stopOscillators() {
            if (!state.audioContext) return;
            
            const fadeTime = state.fadeTime;
            const currentTime = state.audioContext.currentTime;
            
            // Fade out
            if (state.leftGain && state.audioContext) {
                try {
                    state.leftGain.gain.linearRampToValueAtTime(0, currentTime + fadeTime);
                    state.rightGain.gain.linearRampToValueAtTime(0, currentTime + fadeTime);
                } catch(e) {}
            }
            
            // Stop noise
            stopNoise();
            
            // Stop drift LFO
            if (state.driftLFO) {
                try { state.driftLFO.stop(); } catch(e) {}
                try { state.driftLFO.disconnect(); } catch(e) {}
                state.driftLFO = null;
                state.driftLFOGain = null;
            }
            
            // Stop oscillators after fade
            setTimeout(() => {
                if (state.leftOscillator) {
                    try { state.leftOscillator.stop(); } catch(e) {}
                    try { state.leftOscillator.disconnect(); } catch(e) {}
                }
                if (state.rightOscillator) {
                    try { state.rightOscillator.stop(); } catch(e) {}
                    try { state.rightOscillator.disconnect(); } catch(e) {}
                }
                state.leftOscillator = null;
                state.rightOscillator = null;
            }, fadeTime * 1000 + 100);
        }

        function startNoise() {
            if (!state.audioContext || !state.noiseBuffer) return;
            
            // Disconnect old noise node
            if (state.noiseNode) {
                try { state.noiseNode.stop(); } catch(e) {}
                try { state.noiseNode.disconnect(); } catch(e) {}
            }
            
            state.noiseNode = state.audioContext.createBufferSource();
            state.noiseNode.buffer = state.noiseBuffer;
            state.noiseNode.loop = true;
            
            // Premium noise filtering - gentle lowpass for ambient warmth
            state.noiseFilter = state.audioContext.createBiquadFilter();
            state.noiseFilter.type = 'lowpass';
            state.noiseFilter.frequency.value = 350; // Slightly lower for warmth
            state.noiseFilter.Q.value = 0.5; // Smoother rolloff
            
            // Add a gentle highpass to remove subsonic rumble
            state.noiseHighpass = state.audioContext.createBiquadFilter();
            state.noiseHighpass.type = 'highpass';
            state.noiseHighpass.frequency.value = 40; // Remove subsonic content
            state.noiseHighpass.Q.value = 0.707;
            
            state.noiseGain = state.audioContext.createGain();
            state.noiseGain.gain.value = state.noiseEnabled ? state.noiseVolume / 200 : 0;
            
            // Connect: noise -> highpass -> lowpass -> gain -> warmth chain
            state.noiseNode.connect(state.noiseHighpass);
            state.noiseHighpass.connect(state.noiseFilter);
            state.noiseFilter.connect(state.noiseGain);
            state.noiseGain.connect(state.waveshaper);
            
            state.noiseNode.start();
        }

        function stopNoise() {
            if (state.noiseNode) {
                try { state.noiseNode.stop(); } catch(e) {}
                try { state.noiseNode.disconnect(); } catch(e) {}
            }
            if (state.noiseHighpass) {
                try { state.noiseHighpass.disconnect(); } catch(e) {}
            }
            state.noiseNode = null;
            state.noiseHighpass = null;
        }

        function updateMasterVolume() {
            if (state.masterGain && state.audioContext) {
                state.masterGain.gain.linearRampToValueAtTime(
                    state.volume / 100,
                    state.audioContext.currentTime + 0.1
                );
            }
        }

        function updatePan() {
            if (state.panner && state.audioContext) {
                state.panner.pan.linearRampToValueAtTime(
                    state.pan,
                    state.audioContext.currentTime + 0.1
                );
            }
        }

        function updateWarmth() {
            if (state.waveshaper && state.audioContext) {
                state.waveshaper.curve = createWarmthCurve(state.warmth);
            }
        }

        function updateLowpass() {
            if (state.lowpassFilter && state.audioContext) {
                // Smooth transition for lowpass
                state.lowpassFilter.frequency.setTargetAtTime(
                    state.lowpassFreq,
                    state.audioContext.currentTime,
                    0.1
                );
            }
            // Also update high-shelf for consistent frequency response
            if (state.highShelfFilter && state.audioContext) {
                // Adjust high-shelf frequency based on lowpass for coherent response
                const highShelfFreq = Math.max(state.lowpassFreq * 8, 4000);
                state.highShelfFilter.frequency.setTargetAtTime(
                    highShelfFreq,
                    state.audioContext.currentTime,
                    0.1
                );
            }
        }

        function updateNoiseVolume() {
            if (state.noiseGain && state.audioContext) {
                state.noiseGain.gain.linearRampToValueAtTime(
                    state.noiseEnabled ? state.noiseVolume / 200 : 0,
                    state.audioContext.currentTime + 0.1
                );
            }
        }

        // ============================================
        // Knob Control System
        // ============================================

        class Knob {
            constructor(element) {
                this.element = element;
                this.handle = element.querySelector('.knob-handle');
                this.progress = element.querySelector('.knob-progress');
                this.valueDisplay = element.parentElement.querySelector('.knob-value span');
                this.unitDisplay = element.parentElement.querySelector('.knob-unit');
                
                this.min = parseFloat(element.dataset.min);
                this.max = parseFloat(element.dataset.max);
                this.value = parseFloat(element.dataset.value);
                this.unit = element.dataset.unit;
                
                this.isDragging = false;
                this.startY = 0;
                this.startValue = 0;
                
                this.init();
            }
            
            init() {
                this.updateDisplay();
                this.addEventListeners();
            }
            
            addEventListeners() {
                this.element.addEventListener('pointerdown', (e) => this.onPointerDown(e));
                this.element.addEventListener('keydown', (e) => this.onKeyDown(e));
                this.element.addEventListener('contextmenu', (e) => e.preventDefault());
            }
            
            onPointerDown(e) {
                e.preventDefault();
                this.isDragging = true;
                this.startY = e.clientY;
                this.startValue = this.value;
                
                this.element.setPointerCapture(e.pointerId);
                this.element.style.cursor = 'grabbing';
                
                document.addEventListener('pointermove', this.onPointerMove);
                document.addEventListener('pointerup', this.onPointerUp);
            }
            
            onPointerMove = (e) => {
                if (!this.isDragging) return;
                
                const deltaY = this.startY - e.clientY;
                const range = this.max - this.min;
                const sensitivity = range / 200;
                
                let newValue = this.startValue + deltaY * sensitivity;
                newValue = Math.max(this.min, Math.min(this.max, newValue));
                
                this.setValue(newValue);
            }
            
            onPointerUp = (e) => {
                if (!this.isDragging) return;
                
                this.isDragging = false;
                this.element.releasePointerCapture(e.pointerId);
                this.element.style.cursor = 'grab';
                
                document.removeEventListener('pointermove', this.onPointerMove);
                document.removeEventListener('pointerup', this.onPointerUp);
            }
            
            onKeyDown(e) {
                const step = (this.max - this.min) / 50;
                
                if (e.key === 'ArrowUp' || e.key === 'ArrowRight') {
                    e.preventDefault();
                    this.setValue(Math.min(this.max, this.value + step));
                } else if (e.key === 'ArrowDown' || e.key === 'ArrowLeft') {
                    e.preventDefault();
                    this.setValue(Math.max(this.min, this.value - step));
                }
            }
            
            setValue(newValue) {
                this.value = newValue;
                this.element.dataset.value = newValue;
                this.updateDisplay();
                this.onValueChange(newValue);
            }
            
            updateDisplay() {
                const percentage = (this.value - this.min) / (this.max - this.min);
                const dashArray = 188.5;
                const dashOffset = dashArray * (1 - percentage);
                
                if (this.progress) {
                    this.progress.style.strokeDasharray = dashArray;
                    this.progress.style.strokeDashoffset = dashOffset;
                }
                
                if (this.valueDisplay) {
                    if (this.unit === 'Hz' || this.unit === 's') {
                        this.valueDisplay.textContent = this.value.toFixed(1);
                    } else if (this.unit === '%') {
                        this.valueDisplay.textContent = Math.round(this.value);
                    } else {
                        this.valueDisplay.textContent = this.value.toFixed(2);
                    }
                }
            }
            
            onValueChange(newValue) {
                // Override in specific knob handlers
            }
        }

        // ============================================
        // Visualizer
        // ============================================

        function initVisualizer() {
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            
            function draw() {
                requestAnimationFrame(draw);
                
                if (!state.analyser || !state.isPlaying) {
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    return;
                }
                
                const bufferLength = state.analyser.timeDomainData.length;
                const dataArray = new Uint8Array(bufferLength);
                state.analyser.getByteTimeDomainData(dataArray);
                
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.lineWidth = 2;
                ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
                ctx.shadowBlur = 12;
                ctx.shadowColor = getComputedStyle(document.documentElement).getPropertyValue('--accent');
                
                ctx.beginPath();
                
                const sliceWidth = canvas.width / bufferLength;
                let x = 0;
                
                for (let i = 0; i < bufferLength; i++) {
                    const v = dataArray[i] / 128.0;
                    const y = v * canvas.height / 2;
                    
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                    
                    x += sliceWidth;
                }
                
                ctx.lineTo(canvas.width, canvas.height / 2);
                ctx.stroke();
                
                ctx.shadowBlur = 0;
            }
            
            draw();
        }

        // ============================================
        // Brainwave State Badge
        // ============================================

        function updateBrainwaveBadge() {
            const beat = state.beatFreq;
            let stateName, stateColor;
            
            if (beat < 4) {
                stateName = 'DELTA';
                stateColor = state.colors.delta;
            } else if (beat < 8) {
                stateName = 'THETA';
                stateColor = state.colors.theta;
            } else if (beat < 13) {
                stateName = 'ALPHA';
                stateColor = state.colors.alpha;
            } else if (beat < 30) {
                stateName = 'BETA';
                stateColor = state.colors.beta;
            } else {
                stateName = 'GAMMA';
                stateColor = state.colors.gamma;
            }
            
            document.documentElement.style.setProperty('--accent', stateColor);
            
            const badge = document.querySelector('.state-badge .state-text');
            const dot = document.querySelector('.state-dot');
            
            if (state.isPlaying) {
                badge.textContent = `${stateName} — ${beat.toFixed(1)} Hz`;
            } else {
                badge.textContent = 'READY';
            }
            
            dot.style.background = stateColor;
            dot.style.boxShadow = `0 0 12px ${stateColor}`;
            
            const label = document.getElementById('brainwaveLabel');
            label.textContent = `${stateName} — ${beat.toFixed(1)} Hz Beat Frequency`;
            label.style.color = stateColor;
            
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.state === stateName.toLowerCase()) {
                    btn.classList.add('active');
                }
            });
        }

        // ============================================
        // L/R Frequency Display
        // ============================================

        function updateLRDisplay() {
            const leftFreq = state.carrierFreq + state.beatFreq / 2;
            const rightFreq = state.carrierFreq - state.beatFreq / 2;
            
            document.getElementById('leftFreq').textContent = leftFreq.toFixed(1);
            document.getElementById('rightFreq').textContent = rightFreq.toFixed(1);
        }

        // ============================================
        // Timer System
        // ============================================

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function startSessionTimer() {
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
            }
            
            state.sessionStartTime = Date.now();
            
            state.timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - state.sessionStartTime) / 1000);
                document.getElementById('timerDisplay').textContent = formatTime(elapsed);
            }, 1000);
        }

        function stopSessionTimer() {
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }
            document.getElementById('timerDisplay').textContent = '00:00';
        }

        function setPresetTimer(minutes) {
            if (state.presetTimer) {
                clearInterval(state.presetTimer);
            }
            
            document.querySelectorAll('.timer-btn').forEach(btn => {
                btn.classList.remove('active');
                if (parseInt(btn.dataset.timer) === minutes) {
                    btn.classList.add('active');
                }
            });
            
            const totalSeconds = minutes * 60;
            let remaining = totalSeconds;
            
            document.getElementById('countdownDisplay').textContent = formatTime(remaining);
            document.getElementById('timerOverlay').classList.add('visible');
            
            state.presetTimer = setInterval(() => {
                remaining--;
                document.getElementById('countdownDisplay').textContent = formatTime(remaining);
                
                if (remaining <= 0) {
                    clearInterval(state.presetTimer);
                    state.presetTimer = null;
                    document.getElementById('timerOverlay').classList.remove('visible');
                    stopAudio();
                }
            }, 1000);
        }

        function clearPresetTimer() {
            if (state.presetTimer) {
                clearInterval(state.presetTimer);
                state.presetTimer = null;
            }
            document.getElementById('timerOverlay').classList.remove('visible');
            document.querySelectorAll('.timer-btn').forEach(btn => {
                btn.classList.remove('active');
            });
        }

        // ============================================
        // Play/Stop Control
        // ============================================

        function playAudio() {
            initAudioContext();
            
            if (state.audioContext.state === 'suspended') {
                state.audioContext.resume();
            }
            
            state.isPlaying = true;
            startOscillators();
            startSessionTimer();
            
            document.getElementById('playBtn').classList.add('playing');
            document.getElementById('playBtnText').textContent = '■ STOP';
            document.querySelector('.state-badge .state-text').textContent = 
                `${getBrainwaveName(state.beatFreq)} — ${state.beatFreq.toFixed(1)} Hz`;
            
            updateBrainwaveBadge();
        }

        function stopAudio() {
            state.isPlaying = false;
            stopOscillators();
            stopSessionTimer();
            
            document.getElementById('playBtn').classList.remove('playing');
            document.getElementById('playBtnText').textContent = '▶ PLAY';
            document.querySelector('.state-badge .state-text').textContent = 'READY';
            
            updateBrainwaveBadge();
        }

        function togglePlay() {
            if (state.isPlaying) {
                stopAudio();
            } else {
                playAudio();
            }
        }

        function getBrainwaveName(beat) {
            if (beat < 4) return 'DELTA';
            if (beat < 8) return 'THETA';
            if (beat < 13) return 'ALPHA';
            if (beat < 30) return 'BETA';
            return 'GAMMA';
        }

        // ============================================
        // Reset Function
        // ============================================

        function resetAll() {
            stopAudio();
            clearPresetTimer();
            
            state.carrierFreq = 200;
            state.beatFreq = 10;
            state.volume = 70;
            state.fadeTime = 2;
            state.pan = 0;
            state.warmth = 35;
            state.lowpassFreq = 800;
            state.driftAmount = 15;
            state.noiseVolume = 20;
            state.noiseEnabled = false;
            state.waveform = 'sine';
            
            carrierKnob.setValue(200);
            beatKnob.setValue(10);
            volumeKnob.setValue(70);
            fadeKnob.setValue(2);
            panKnob.setValue(0);
            warmthKnob.setValue(35);
            lowpassKnob.setValue(800);
            driftKnob.setValue(15);
            noiseKnob.setValue(20);
            
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.state === 'alpha') {
                    btn.classList.add('active');
                }
            });
            
            document.querySelectorAll('.waveform-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.waveform === 'sine') {
                    btn.classList.add('active');
                }
            });
            
            document.getElementById('noiseToggle').classList.remove('active');
            
            updateLRDisplay();
            updateBrainwaveBadge();
            
            if (state.audioContext) {
                if (state.leftOscillator) {
                    try { state.leftOscillator.stop(); } catch(e) {}
                    try { state.leftOscillator.disconnect(); } catch(e) {}
                }
                if (state.rightOscillator) {
                    try { state.rightOscillator.stop(); } catch(e) {}
                    try { state.rightOscillator.disconnect(); } catch(e) {}
                }
            }
        }

        // ============================================
        // Event Listeners
        // ============================================

        document.getElementById('playBtn').addEventListener('click', togglePlay);
        document.getElementById('playBtn').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                togglePlay();
            }
        });

        document.getElementById('resetBtn').addEventListener('click', resetAll);
        document.getElementById('resetBtn').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                resetAll();
            }
        });

        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const preset = state.presets[btn.dataset.preset];
                if (preset) {
                    carrierKnob.setValue(preset.carrier);
                    beatKnob.setValue(preset.beat);
                    
                    state.carrierFreq = preset.carrier;
                    state.beatFreq = preset.beat;
                    
                    updateLRDisplay();
                    updateBrainwaveBadge();
                    
                    if (state.isPlaying) {
                        startOscillators();
                    }
                }
            });
            
            btn.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    btn.click();
                }
            });
        });

        document.querySelectorAll('.waveform-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                state.waveform = btn.dataset.waveform;
                
                document.querySelectorAll('.waveform-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                if (state.isPlaying) {
                    startOscillators();
                }
            });
            
            btn.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    btn.click();
                }
            });
        });

        document.querySelectorAll('.timer-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const minutes = parseInt(btn.dataset.timer);
                setPresetTimer(minutes);
            });
            
            btn.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    btn.click();
                }
            });
        });

        document.getElementById('noiseToggle').addEventListener('click', () => {
            state.noiseEnabled = !state.noiseEnabled;
            
            document.getElementById('noiseToggle').classList.toggle('active', state.noiseEnabled);
            document.getElementById('noiseToggle').textContent = state.noiseEnabled ? 'NOISE: ON' : 'NOISE: OFF';
            
            if (state.isPlaying) {
                if (state.noiseEnabled) {
                    startNoise();
                } else {
                    stopNoise();
                }
                updateNoiseVolume();
            }
        });
        
        document.getElementById('noiseToggle').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                document.getElementById('noiseToggle').click();
            }
        });

        window.addEventListener('resize', () => {
            const canvas = document.getElementById('visualizer');
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
        });

        // ============================================
        // Initialize Knobs with Custom Handlers
        // ============================================

        document.addEventListener('DOMContentLoaded', () => {
            initVisualizer();
            updateBrainwaveBadge();
            updateLRDisplay();
            
            // Create knobs with value change handlers
            carrierKnob = new Knob(document.getElementById('carrierKnob'));
            carrierKnob.onValueChange = (val) => {
                state.carrierFreq = val;
                if (state.isPlaying) startOscillators();
                updateLRDisplay();
            };
            
            beatKnob = new Knob(document.getElementById('beatKnob'));
            beatKnob.onValueChange = (val) => {
                state.beatFreq = val;
                if (state.isPlaying) startOscillators();
                updateLRDisplay();
                updateBrainwaveBadge();
            };
            
            volumeKnob = new Knob(document.getElementById('volumeKnob'));
            volumeKnob.onValueChange = (val) => {
                state.volume = val;
                updateMasterVolume();
            };
            
            fadeKnob = new Knob(document.getElementById('fadeKnob'));
            fadeKnob.onValueChange = (val) => {
                state.fadeTime = val;
            };
            
            panKnob = new Knob(document.getElementById('panKnob'));
            panKnob.onValueChange = (val) => {
                state.pan = val;
                updatePan();
            };
            
            warmthKnob = new Knob(document.getElementById('warmthKnob'));
            warmthKnob.onValueChange = (val) => {
                state.warmth = val;
                updateWarmth();
            };
            
            lowpassKnob = new Knob(document.getElementById('lowpassKnob'));
            lowpassKnob.onValueChange = (val) => {
                state.lowpassFreq = val;
                updateLowpass();
            };
            
            driftKnob = new Knob(document.getElementById('driftKnob'));
            driftKnob.onValueChange = (val) => {
                state.driftAmount = val;
                if (state.isPlaying) {
                    setupDriftLFO();
                }
            };
            
            noiseKnob = new Knob(document.getElementById('noiseKnob'));
            noiseKnob.onValueChange = (val) => {
                state.noiseVolume = val;
                updateNoiseVolume();
            };
        });

        window.addEventListener('beforeunload', () => {
            stopAudio();
            if (state.audioContext) {
                state.audioContext.close();
            }
        });
    </script>
</body>
</html>
